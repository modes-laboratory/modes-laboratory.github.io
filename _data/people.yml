# Structured people data for MODES Lab

- name: "Dr. Juri Di Rocco"
  role: "Lead - Tenure-track Assistant Professor (RTD/B)"
  email: "juri.dirocco@univaq.it"
  bio: "Juri Di Rocco is a Tenure-track Assistant Professor (RTD/B) at the Department of Information Engineering, Computer Science and Mathematics (DISIM) of the University of L'Aquila, where he obtained his Ph.D. in 2017 under the supervision of Alfonso Pierantonio and Davide Di Ruscio. He holds the Italian habilitation (ASN 2021/2023) as Associate Professor. His research spans Model-Driven Engineering, Mining Software Repositories, Recommender Systems, and AI-driven software engineering (LLMs, Deep Learning). He has authored 31 journal papers, 27 conference papers, and 32 workshop papers. According to Google Scholar he has 1,949 citations and an h-index of 23; according to Scopus, 1,277 citations and an h-index of 19. He has been principal investigator or work-package leader in six EU-funded projects (OSSMETER, CROSSMINER, TYPHON, EMELIOT/PRIN 2021, MOSAICO, AIM-PRO). He has received eight best-paper or distinguished-paper awards, including the SoSyM First Paper Award 2022, Best Foundation Paper MoDELS 2021 and 2019, and Best Paper COLA 2023. He is Assistant Editor of the Journal of Object Technology and member of the Editorial Board of Software Quality Journal. He has served on the organization and program committees of more than 50 international venues, including MODELS, ICSE, and SANER."
  photo: "/assets/images/people/juri.jpeg"
  url: "https://jdirocco.github.io"

- name: "Prof. Davide Di Ruscio"
  role: "Full Professor"
  email: "davide.diruscio@univaq.it"
  bio: "Davide Di Ruscio is a Full Professor at the Department of Information Engineering, Computer Science and Mathematics (DISIM) of the University of L'Aquila. His research focuses on Software Engineering, Model-Driven Engineering (MDE), domain-specific modelling languages, model transformation, model differencing, coupled evolution, open source software analysis, and recommender systems. He has published more than 178 papers in international journals, conferences and workshops. According to Google Scholar he has 3,801 citations and an h-index of 32; according to Scopus, 2,282 citations and an h-index of 24. He has been work-package leader in several EU H2020 projects with total budgets exceeding €15M, including CROSSMINER, TYPHON, ConnectPA, and MOSAICO. He serves on the editorial boards of Software and Systems Modeling (SoSyM), IEEE Software, and the Journal of Object Technology. He is a member of the steering committees of ICMT, SLE, SATTOSE, MiSE, and RoSE."
  photo: "/assets/images/people/davide.jpg"
  url: "https://www.disim.univaq.it/home2f4d3.html?users_username=davide.diruscio"

- name: "Prof. Alfonso Pierantonio"
  role: "Full Professor"
  email: "alfonso.pierantonio@univaq.it"
  bio: "Alfonso Pierantonio is Full Professor in the Dipartimento di Ingegneria e Scienze dell'Informazione e Matematica of the Università degli Studi dell'Aquila. Since January 2016 he is visiting Full Professor at Mälardalens University (Sweden). His expertise spans software engineering with a focus on model-driven and language engineering, low-code development, co-evolution techniques, consistency management, bidirectionality, and classification and clustering of modeling artifact repositories. He has published more than 170 papers. According to Google Scholar (June 2022) he has more than 4,300 citations and an h-index of 34; according to Scopus, more than 2,200 citations and h-index 26. He is Editor-in-Chief of the Journal of Object Technology, member of the Editorial Board of the Journal of Software and System Modeling, and on the advisory board of Science of Computer Programming. He served as General Chair of MoDELS 2023, STAF 2015, and ICMT 2008, and as keynote speaker at VaMoS'22, STAF 2019, STAF 2018, MoDELS 2016, and other venues. He has been (co-)principal investigator on six EU-funded projects: LOWCOMOTE, TYPHON, CROSSMINER, LEARNPAD, OSSMETER, and MANCOOSI. Awards include the 2020 Most Influential Paper Award at SLE and Best Paper Awards at MODELS 2019 and SLE 2015."
  photo: "/assets/images/people/alfonso.jpg"
  url: "https://www.disim.univaq.it/AlfonsoPierantonio/22/"

- name: "Prof. Antonio Bucchiarone"
  role: "Associate Professor"
  email: "antonio.bucchiarone@univaq.it"
  bio: "Antonio Bucchiarone is currently an Associate Professor at the University of L'Aquila and a Visiting Fellow at Fondazione Bruno Kessler (FBK) in Trento, Italy. He specializes in adaptive systems, motivational digital systems using gamification, intelligent mobility, and the design and development of educational tools. His research focuses on models and tools for adaptive (collective) systems, modeling and development languages for motivational digital systems, and educational tools supported by Model-Driven Engineering. Dr. Bucchiarone has contributed to numerous national and European R&D projects, including the Erasmus+ project ENCORE. He is a Senior Member of IEEE and serves as Associate Editor for IEEE Software, Journal of Object Technology (JOT), IEEE Transactions on Education, IEEE Transactions on Games, IEEE Transactions on Intelligent Transportation Systems (T-ITS), and IEEE Technology and Society."
  photo: "/assets/images/people/antonio.jpg"
  url: "https://antoniosbucchiarone.wixsite.com/bucchiarone"

- name: "Prof. Phuong Thanh Nguyen"
  role: "Associate Professor"
  email: "phuong.nguyen@univaq.it"
  bio: "Phuong Thanh Nguyen is Associate Professor at the University of L'Aquila (Italy), where he holds the Italian habilitation (ASN 2021) as Associate Professor in both Computer Science (01/B1) and Computer Engineering (09/H1). He obtained a Ph.D. in Computer Science from the University of Jena (Germany) in 2012, and held postdoctoral positions at Politecnico di Bari (2014) and the University of L'Aquila (2017–2025). His research interests include Mining Software Repositories, Recommender Systems for Software Engineering, Machine Learning and Deep Learning, Model-Driven Engineering, and Semantic Web and Linked Data. He has participated in several EU projects including CROSSMINER, TYPHON, and MOSAICO. He is Editor-in-Chief of the Software Quality Journal and Associate Editor of Springer Applied Intelligence. He has received multiple best-paper awards including the SoSyM First Paper Award 2022, Best Foundation Paper MODELS 2021, Best Paper MODELS 2019, Diamond+Best Paper JSS 2020, Distinguished Paper SEAA 2018, and Best Paper EASE 2025."
  photo: "/assets/images/people/phuong.png"
  url: "https://www.disim.univaq.it/home2f4d3.html?users_username=phuong.than.nguyen"

- name: "Dr. Claudio Di Sipio"
  role: "Post-doc / Research Fellow"
  email: "claudio.disipio@univaq.it"
  bio: "Claudio Di Sipio is a postdoctoral researcher at the University of L'Aquila, Italy. He obtained his Ph.D. at the University of L'Aquila under the supervision of Davide Di Ruscio and Phuong Thanh Nguyen. His research focuses on mining techniques to analyse open source software and on the application of low-code platforms and machine learning to support the development of recommender systems for software engineering."
  photo: "/assets/images/people/claudio.png"
  url: "#"

- name: "Dr. Riccardo Rubei"
  role: "Post-doc / Research Fellow"
  email: "riccardo.rubei@univaq.it"
  bio: "Riccardo Rubei is a postdoctoral researcher at the University of L'Aquila, Italy. He obtained his Ph.D. at the University of L'Aquila, co-supervised by Davide Di Ruscio and Phuong Thanh Nguyen. His research focuses on mining techniques to analyse open source software repositories with the aim of providing developers with useful real-time recommendations, including automated upgrade plans for third-party libraries."
  photo: "/assets/images/people/riccardo.png"
  url: "#"

- name: "Dr. Damiano Di Vincenzo"
  role: "Post-doc / Research Fellow"
  email: "damiano.divincenzo@univaq.it"
  bio: "Damiano Di Vincenzo is a postdoctoral researcher at the University of L'Aquila, Italy. He holds a Master's degree in Web Technologies and graduated with a thesis on encoding the Ecore and EMF frameworks within the Angular/Node.js ecosystem. Since 2020 he has been the principal designer of the Jjodel collaborative modeling platform and currently serves as its Co-Chief Architect. His research spans model-driven engineering, collaborative modeling environments, language design, and platform architecture."
  photo: "/assets/images/people/damiano.png"
  url: "#"
