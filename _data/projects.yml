-
  id: aim-pro
  title: AIM-PRO
  year_start: 2026
  year_end: ""
  status: active
  funding: EU Horizon Europe
  summary: "AIM-PRO (AI-powered Model-driven engineering for Productive software development) is a Horizon Europe project focused on developing AI-powered model-driven engineering techniques to improve software productivity. Juri Di Rocco is Work-Package 2 Leader for the University of L'Aquila."
  partners:
    - University of L'Aquila (WP2 Leader)
  link: "https://aim-pro.eu"
  image: "/assets/images/projects/aim-pro.png"

-
  id: mosaico
  title: MOSAICO
  year_start: 2025
  year_end: ""
  status: active
  funding: EU Horizon Europe
  summary: "MOSAICO is a Horizon Europe project aimed at revolutionizing software development by enabling seamless collaboration between AI agents and human developers. It develops dedicated platforms and communication protocols to coordinate multiple AI agents within the software development lifecycle, fostering human-AI collaboration and ensuring ethical and responsible AI development."
  partners:
    - European Consortium
  link: "https://mosaico-project.eu"
  image: "/assets/images/projects/mosaico.svg"

-
  id: emeliot
  title: EMELIOT / PRIN 2021
  year_start: 2022
  year_end: 2024
  status: completed
  funding: MIUR PRIN 2021
  summary: "EMELIOT (Engineering and Mining of Emergent bEhaviors in IoT ecosystems) is an Italian national (PRIN 2021) research project investigating techniques for engineering and mining emergent behaviors in Internet of Things ecosystems using model-driven approaches."
  partners:
    - University of L'Aquila
  link: ""
  image: ""

-
  id: lowcomote
  title: LOWCOMOTE
  year_start: 2019
  year_end: 2023
  status: completed
  funding: EU H2020 MSCA-ITN-2018
  summary: "LOWCOMOTE (Training the Next Generation of Experts in Scalable Low-Code Engineering Platforms) was an H2020 Marie Skłodowska-Curie Innovative Training Network project. Alfonso Pierantonio was co-principal investigator and ESR supervisor for the University of L'Aquila, coordinating training of early-stage researchers in low-code development platforms and model-driven engineering."
  partners:
    - University of L'Aquila (co-PI)
    - European Consortium
  link: "https://lowcomote.eu"
  image: "/assets/images/projects/lowcomote.svg"

-
  id: typhon
  title: TYPHON
  year_start: 2018
  year_end: 2021
  status: completed
  funding: EU H2020-ICT-2017-1
  summary: "TYPHON provided an industry-validated methodology and integrated technical offering for designing, developing, querying, evolving, analysing and monitoring scalable hybrid data persistence architectures. The University of L'Aquila (€308,750) contributed tools and languages for designing hybrid polystores, including a recommender system for storage technology selection. Members: Juri Di Rocco, Davide Di Ruscio, Alfonso Pierantonio, Phuong T. Nguyen."
  budget_total: "€15M"
  budget_univaq: "€308,750"
  partners:
    - University of L'Aquila
    - European Industrial Consortium
  link: "https://www.typhon-project.org"
  image: "/assets/images/projects/typhon.png"

-
  id: crossminer
  title: CROSSMINER
  year_start: 2017
  year_end: 2019
  status: completed
  funding: EU H2020-ICT-2016-1
  summary: "CROSSMINER (Developer-Centric Knowledge Mining from Large Open-Source Software Repositories) enabled the monitoring, in-depth analysis and evidence-based selection of open-source components. The project developed Eclipse-based IDE tools and analytical dashboards providing real-time recommendations to software developers. The University of L'Aquila (€380,922) was Work-Package Leader. Key members: Davide Di Ruscio, Juri Di Rocco, Phuong T. Nguyen, Alfonso Pierantonio."
  budget_total: "€4.5M"
  budget_univaq: "€380,922"
  partners:
    - University of L'Aquila (WP Leader)
    - 11 international partners
  link: "https://www.crossminer.org"
  image: "/assets/images/projects/crossminer.jpg"

-
  id: learnpad
  title: LearnPad
  year_start: 2013
  year_end: 2016
  status: completed
  funding: EU FP7-ICT-2013-11
  summary: "LearnPad (A Model-Based Collaborative Platform for Process-Oriented Learning) developed tools and techniques to support process-oriented learning in educational and professional contexts. Alfonso Pierantonio was principal investigator for the University of L'Aquila and Work-Package Leader."
  partners:
    - University of L'Aquila (PI, WP Leader)
    - European Consortium
  link: "https://cordis.europa.eu/project/id/619583/results"
  image: "/assets/images/projects/learnpad.png"

-
  id: ossmeter
  title: OSSMETER
  year_start: 2012
  year_end: 2015
  status: completed
  funding: EU FP7-ICT-2011-8
  summary: "OSSMETER extended the state-of-the-art in automated analysis and measurement of open-source software, developing a platform supporting decision makers in discovering, comparing, assessing and monitoring the health, quality and activity of OSS projects through advanced analysis of metadata, source code repositories, communication channels and bug tracking systems."
  partners:
    - University of L'Aquila
    - Rete Ferroviaria Italiana
  link: "http://www.ossmeter.org"
  image: "/assets/images/projects/ossmeter.png"

-
  id: mancoosi
  title: MANCOOSI
  year_start: 2008
  year_end: 2011
  status: completed
  funding: EU FP7-ICT-2007-1
  summary: "MANCOOSI (Managing the Complexity of the Open Source Infrastructure) tackled the challenges of managing large and complex open-source software distributions, developing formal methods and tools for dependency resolution and upgrade planning. Alfonso Pierantonio was principal investigator for the University of L'Aquila and Work-Package Leader."
  partners:
    - University of L'Aquila (PI, WP Leader)
    - European Consortium
  link: "https://www.mancoosi.org"
  image: "/assets/images/projects/mancoosi.jpg"
